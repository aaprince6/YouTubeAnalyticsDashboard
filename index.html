<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Analytics Dashboard</title>
    <meta name="description" content="Advanced real-time YouTube channel analytics with engagement metrics, charts, video insights, and export.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23ff0000' width='100' height='100' rx='20'/><text x='50' y='68' font-size='60' text-anchor='middle' fill='white'>▶</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="bannerContainer" class="banner-container" style="display:none">
        <img id="channelBanner" class="channel-banner" src="" alt="">
        <div class="banner-overlay"></div>
    </div>

    <div class="container">
        <header>
            <div class="header-top">
                <h1>YouTube Analytics</h1>
                <div class="header-actions">
                    <button id="exportBtn" class="btn-icon" title="Export data">📥</button>
                    <button id="clearBtn" class="btn-icon" title="Clear dashboard">✕</button>
                    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark/light mode">
                        <span class="sun-icon">☀️</span>
                        <span class="moon-icon">🌙</span>
                    </button>
                </div>
            </div>
            <div class="controls">
                <div class="search-group">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="channelId" placeholder="Channel ID, handle, or paste video link" aria-label="Channel ID, handle, or YouTube video link" autocomplete="off" spellcheck="false">
                    <div id="searchResults" class="search-results" role="listbox" aria-label="Search results"></div>
                </div>
                <button id="loadData" class="btn-primary">
                    <span class="btn-label">Analyze</span>
                    <span class="btn-spinner" style="display:none"></span>
                </button>
            </div>
            <div id="lastUpdated" class="last-updated" aria-live="polite"></div>
        </header>

        <main>
            <section id="channelInfo" class="channel-info" style="display:none" aria-label="Channel information">
                <img id="channelThumb" class="channel-thumb" src="" alt="">
                <div class="channel-details">
                    <div class="channel-name-row">
                        <h2 id="channelName" class="channel-name"></h2>
                        <span id="verifiedBadge" class="verified-badge" style="display:none" title="Verified">✓</span>
                    </div>
                    <p id="channelHandle" class="channel-handle"></p>
                    <p id="channelDescription" class="channel-description"></p>
                    <div class="channel-meta">
                        <span id="channelCountry" class="channel-meta-item"></span>
                        <span id="channelDate" class="channel-meta-item"></span>
                        <span id="channelSubs" class="channel-meta-item"></span>
                        <span id="channelViews" class="channel-meta-item"></span>
                    </div>
                </div>
            </section>

            <section class="stats-grid" id="statsGrid" style="display:none" aria-label="Channel statistics">
                <div class="stat-card stat-primary">
                    <div class="stat-icon">👁️</div>
                    <div class="stat-body">
                        <span class="stat-label">Total Views</span>
                        <span id="totalViews" class="stat-value" aria-live="polite">-</span>
                    </div>
                    <span id="viewsTrend" class="stat-trend"></span>
                </div>
                <div class="stat-card stat-accent">
                    <div class="stat-icon">📡</div>
                    <div class="stat-body">
                        <span class="stat-label">Subscribers</span>
                        <span id="subscriberCount" class="stat-value" aria-live="polite">-</span>
                    </div>
                    <span id="subsTrend" class="stat-trend"></span>
                </div>
                <div class="stat-card stat-info">
                    <div class="stat-icon">🎬</div>
                    <div class="stat-body">
                        <span class="stat-label">Total Videos</span>
                        <span id="videoCount" class="stat-value" aria-live="polite">-</span>
                    </div>
                    <span id="videoTrend" class="stat-trend"></span>
                </div>
                <div class="stat-card stat-green">
                    <div class="stat-icon">⚡</div>
                    <div class="stat-body">
                        <span class="stat-label">Est. Engagement Rate</span>
                        <span id="engagementRate" class="stat-value" aria-live="polite">-</span>
                    </div>
                    <span id="engagementTrend" class="stat-trend"></span>
                </div>
                <div class="stat-card stat-warning">
                    <div class="stat-icon">📈</div>
                    <div class="stat-body">
                        <span class="stat-label">Est. Monthly Revenue</span>
                        <span id="estimatedRevenue" class="stat-value" aria-live="polite">-</span>
                        <select id="currencySelect" class="currency-select" aria-label="Select currency">
                            <option value="USD">USD ($)</option>
                            <option value="EUR">EUR (€)</option>
                            <option value="GBP">GBP (£)</option>
                            <option value="JPY">JPY (¥)</option>
                            <option value="INR">INR (₹)</option>
                            <option value="BDT">BDT (৳)</option>
                            <option value="AUD">AUD (A$)</option>
                            <option value="CAD">CAD (C$)</option>
                            <option value="BRL">BRL (R$)</option>
                            <option value="KRW">KRW (₩)</option>
                            <option value="CNY">CNY (¥)</option>
                            <option value="RUB">RUB (₽)</option>
                        </select>
                    </div>
                    <span id="revenueTrend" class="stat-trend"></span>
                </div>
                <div class="stat-card stat-purple">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-body">
                        <span class="stat-label">Est. Avg Watch Time</span>
                        <span id="avgWatchTime" class="stat-value" aria-live="polite">-</span>
                    </div>
                    <span id="watchTrend" class="stat-trend"></span>
                </div>
            </section>

            <section class="charts-section" id="chartsSection" style="display:none" aria-label="Analytics charts">
                <div class="chart-tabs">
                    <button class="chart-tab active" data-chart="subscribers">Subscribers</button>
                    <button class="chart-tab" data-chart="views">Views</button>
                    <button class="chart-tab" data-chart="engagement">Engagement</button>
                </div>
                <div class="charts-grid">
                    <div class="chart-card" id="subscribersChartCard">
                        <canvas id="subscribersChart"></canvas>
                    </div>
                    <div class="chart-card" id="viewsChartCard">
                        <canvas id="viewsChart"></canvas>
                    </div>
                    <div class="chart-card" id="engagementChartCard">
                        <canvas id="engagementChart"></canvas>
                    </div>
                </div>
            </section>

            <section class="videos-section" id="videosSection" style="display:none" aria-label="Top performing videos">
                <div class="videos-header">
                    <div class="videos-header-left">
                        <h2>Top Videos</h2>
                        <span id="videoCountBadge" class="count-badge">0</span>
                    </div>
                    <div class="videos-tabs" id="videoTabs">
                        <button class="video-tab active" data-sort="views">Most Viewed</button>
                        <button class="video-tab" data-sort="likes">Most Liked</button>
                        <button class="video-tab" data-sort="comments">Most Discussed</button>
                        <button class="video-tab" data-sort="engagement">Engagement</button>
                        <button class="video-tab" data-sort="date">Recent</button>
                    </div>
                </div>
                <div id="videosContainer" class="videos-grid">
                    <!-- Video cards rendered by JS -->
                </div>
            </section>
        </main>
    </div>

    <button id="backToTop" class="back-to-top" aria-label="Back to top" title="Back to top">↑</button>

    <noscript><div style="padding:40px;text-align:center;font-family:sans-serif"><h2>JavaScript Required</h2><p>YouTube Analytics Dashboard requires JavaScript to fetch and display data.</p></div></noscript>
    <script src="config.local.js" onerror="this.remove()"></script>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="api.js"></script>
    <script src="charts.js"></script>
    <script src="ui.js"></script>
    <script src="script.js"></script>
</body>
</html>
